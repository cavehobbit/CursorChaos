<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursor Chaos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    canvas {
      display: block;
      cursor: crosshair;
    }

    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      padding: 20px;
      border-radius: 10px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      user-select: none;
    }

    #ui h1 {
      font-size: 20px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    #ui .mode {
      font-size: 14px;
      margin: 5px 0;
      opacity: 0.5;
      transition: all 0.3s;
      cursor: pointer;
      padding: 5px;
      border-radius: 5px;
    }

    #ui .mode.active {
      opacity: 1;
      background: rgba(255, 255, 255, 0.1);
      font-weight: bold;
    }

    #ui .hint {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.6;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 10px;
    }

    #ui .mode:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div id="ui">
    <h1>Cursor Chaos</h1>
    <div class="mode active" data-mode="attract">1 - Attract</div>
    <div class="mode" data-mode="repel">2 - Repel</div>
    <div class="mode" data-mode="swirl">3 - Swirl</div>
    <div class="mode" data-mode="chaos">4 - Chaos</div>
    <div class="mode" data-mode="gravity">5 - Gravity</div>
    <div class="hint">
      Move mouse<br>
      Click to explode<br>
      Press 1-5 to switch
    </div>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    
    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });




    const mouse = { 
      x: canvas.width / 2, 
      y: canvas.height / 2 
    };

    window.addEventListener("mousemove", (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    const particles = [];
    const particleCount = 150;

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = 0;
        this.vy = 0;
        this.size = Math.random() * 2 + 1;
      }




      update(mode) {
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;

        switch(mode) {
          case "attract":
            this.vx += dx * 0.0003;
            this.vy += dy * 0.0003;
            break;

          case "repel":
            this.vx -= dx * 0.0005;
            this.vy -= dy * 0.0005;
            break;

          case "swirl":
            const angle = Math.atan2(dy, dx);
            this.vx += Math.cos(angle + Math.PI / 2) * 0.05;
            this.vy += Math.sin(angle + Math.PI / 2) * 0.05;
            this.vx += dx * 0.0001;
            this.vy += dy * 0.0001;
            break;

          case "chaos":
            this.vx += (Math.random() - 0.5) * 0.5;
            this.vy += (Math.random() - 0.5) * 0.5;
            this.vx += dx * 0.0001;
            this.vy += dy * 0.0001;
            break;

          case "gravity":
            this.vy += 0.1;
            this.vx += dx * 0.0002;
            if (this.y > canvas.height) {
              this.y = 0;
              this.vy = 0;
            }
            break;
        }

        
        this.vx *= 0.95;
        this.vy *= 0.95;


    
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0) this.x = canvas.width;
        if (this.x > canvas.width) this.x = 0;
        if (this.y < 0) this.y = canvas.height;
        if (mode !== "gravity" && this.y > canvas.height) this.y = 0;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Create particles
    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }

    
    let currentMode = "attract";

    // Mode switching
    const modeElements = document.querySelectorAll(".mode");
    
    function setMode(mode) {
      currentMode = mode;
      modeElements.forEach(el => {
        el.classList.toggle("active", el.dataset.mode === mode);
      });
    }

    // Kyboard 
    window.addEventListener("keydown", (e) => {
      const modes = ["attract", "repel", "swirl", "chaos", "gravity"];
      const key = parseInt(e.key);
      if (key >= 1 && key <= 5) {
        setMode(modes[key - 1]);
      }
    });

    // changing mode in ui
    modeElements.forEach(el => {
      el.addEventListener("click", () => {
        setMode(el.dataset.mode);
      });
    });

  
    window.addEventListener("click", (e) => {
      particles.forEach(p => {
        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;

        const force = 8;
        p.vx += (dx / dist) * force;
        p.vy += (dy / dist) * force;
      });
    });

  

    function animate() {
      // Trail effect (instead of full clear)
      ctx.fillStyle = "rgba(10, 10, 10, 0.15)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // particle style
      ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
      ctx.shadowBlur = 15;
      ctx.shadowColor = "white";

      

      particles.forEach(p => {
        p.update(currentMode);
        p.draw();
      });

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
