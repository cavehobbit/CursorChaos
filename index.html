<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursor Chaos</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;

    }

    html,
    body {

      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      font-family: Arial, Helvetica, sans-serif;

      transition: background 0.5s ease;

    }

    body.light-theme {
      background: #ffffff;

    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000000;

      cursor: crosshair;
      z-index: 1;
      transition: background 0.5s ease;
    }

    canvas.light-theme {

      background: #ffffff;
    }

    #ui {
      position: fixed;
      top: 20px;
      left: 20px;

      z-index: 2;
      color: white;
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.15);

      border-radius: 12px;
      padding: 18px;
      user-select: none;
      transition: all 0.3s ease;

    }

    #ui.light-theme {
      color: #000000;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(0, 0, 0, 0.15);

    }

    #ui h1 {
      font-size: 18px;
      margin-bottom: 12px;
    }

    .mode {
      font-size: 14px;
      padding: 6px 8px;
      margin: 4px 0;

      border-radius: 6px;
      opacity: 0.55;
      cursor: pointer;
      transition: 0.2s;
    }

    .mode:hover {
      opacity: 0.85;
      background: rgba(128, 128, 128, 0.15);

    }

    .mode.active {
      opacity: 1;
      background: rgba(128, 128, 128, 0.25);

      font-weight: bold;
    }

    .hint {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(128, 128, 128, 0.3);

      font-size: 12px;
      line-height: 1.5;
      opacity: 0.7;
    }

    #theme-toggle {
      margin-top: 12px;
      padding: 8px 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

      border: none;
      border-radius: 8px;
      color: white;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;

      width: 100%;
      transition: transform 0.2s;
    }

    #theme-toggle:hover {
      transform: scale(1.05);
    }

    #theme-toggle:active {
      transform: scale(0.98);
    }

    #theme-toggle.rainbow {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 25%, #ffd876 50%, #4facfe 75%, #00f2fe 100%);
    }

  </style>
</head>

<body>
  <canvas id="canvas"></canvas>

  <div id="ui">
    <h1> Cursor Chaos</h1>

    <div class="mode active" data-mode="attract">1 - Attract</div>

    <div class="mode" data-mode="repel">2 - Repel</div>
    <div class="mode" data-mode="swirl">3 - Swirl</div>
    <div class="mode" data-mode="chaos">4 - Chaos</div>

    <div class="mode" data-mode="gravity">5 - Gravity</div>

    <button id="theme-toggle"> Rainbow Theme</button>

    <div class="hint">
      Move mouse = interact<br />
      Click = explosion<br />
      Press 1-5 = switch mode<br />
      Press R = toggle theme
    </div>
  </div>


  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const ui = document.getElementById("ui");
    const body = document.body;
    const themeButton = document.getElementById("theme-toggle");

    let width;
    let height;
    let currentTheme = "dark"; 

    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;

      canvas.width = width;
      canvas.height = height;

      
      ctx.globalAlpha = 1;

      ctx.shadowBlur = 0;
      ctx.fillStyle = currentTheme === "dark" ? "#000000" : "#ffffff";
      ctx.fillRect(0, 0, width, height);
    }

    resizeCanvas();

    window.addEventListener("resize", resizeCanvas);

    const mouse = {
      x: width / 2,

      y: height / 2

    };

    window.addEventListener("mousemove", function (e) {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    const particles = [];
    const particleCount = 160;

    class Particle {
      constructor(index) {
        this.index = index;
        this.hue = (index / particleCount) * 360; 
        this.reset();

      }

      reset() {
        this.x = Math.random() * width;

        this.y = Math.random() * height;
        this.vx = 0;
        this.vy = 0;
        this.size = Math.random() * 2.5 + 1.5; 
      }

      update(mode) {
        const dx = mouse.x - this.x;

        const dy = mouse.y - this.y;

        const dist = Math.sqrt(dx * dx + dy * dy) || 1;

        if (mode === "attract") {
          this.vx += dx * 0.00045;

          this.vy += dy * 0.00045;

        }

        if (mode === "repel") {
          this.vx -= dx * 0.00055;
          this.vy -= dy * 0.00055;
        }

        if (mode === "swirl") {
          const angle = Math.atan2(dy, dx);

          this.vx += Math.cos(angle + Math.PI / 2) * 0.06;

          this.vy += Math.sin(angle + Math.PI / 2) * 0.06;

          this.vx += dx * 0.00012;
          this.vy += dy * 0.00012;
        }

        if (mode === "chaos") {
          this.vx += (Math.random() - 0.5) * 0.45;
          this.vy += (Math.random() - 0.5) * 0.45;


          this.vx += dx * 0.00012;

          this.vy += dy * 0.00012;

        }

        if (mode === "gravity") {
          this.vy += 0.12;

          this.vx += dx * 0.0002;

          if (this.y > height + 20) {
            this.y = -20;
            this.x = Math.random() * width;
            this.vy = 0;
            this.vx = 0;
          }
        }

        

        this.vx *= 0.95;
        this.vy *= 0.95;

        this.x += this.vx;
        this.y += this.vy;


        
        if (this.x < -20) this.x = width + 20;
        if (this.x > width + 20) this.x = -20;

        if (mode !== "gravity") {
          if (this.y < -20) this.y = height + 20;
          if (this.y > height + 20) this.y = -20;
        }

        
        if (currentTheme === "rainbow") {
          this.hue = (this.hue + 0.5) % 360;
        }
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle(i));
    }

    let currentMode = "attract";

    const modeElements = document.querySelectorAll(".mode");

    function setMode(mode) {
      currentMode = mode;

      modeElements.forEach(function (el) {
        el.classList.toggle("active", el.dataset.mode === mode);
      });
    }



    function toggleTheme() {
      if (currentTheme === "dark") {
        currentTheme = "rainbow";
        body.classList.add("light-theme");
        canvas.classList.add("light-theme");
        ui.classList.add("light-theme");

        themeButton.classList.add("rainbow");
        themeButton.textContent = " Dark Theme";
      } else {
        currentTheme = "dark";
        body.classList.remove("light-theme");
        canvas.classList.remove("light-theme");
        ui.classList.remove("light-theme");

        themeButton.classList.remove("rainbow");
        themeButton.textContent = "Rainbow Theme";
      }

      
      ctx.fillStyle = currentTheme === "dark" ? "#000000" : "#ffffff";
      ctx.fillRect(0, 0, width, height);
    }

    themeButton.addEventListener("click", function(e) {
      e.stopPropagation();
      toggleTheme();
    });

    window.addEventListener("keydown", function (e) {
      const modes = ["attract", "repel", "swirl", "chaos", "gravity"];
      const key = Number(e.key);

      if (key >= 1 && key <= 5) {
        setMode(modes[key - 1]);
      }

     
      // press r
      if (e.key.toLowerCase() === "r") {
        toggleTheme();
      }
    });

    modeElements.forEach(function (el) {
      
      el.addEventListener("click", function (e) {
        e.stopPropagation();
        setMode(el.dataset.mode);
      });
    });

    window.addEventListener("click", function () {
      particles.forEach(function (p) {
        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;

        const force = 8;

        p.vx += (dx / dist) * force;
        p.vy += (dy / dist) * force;
      });
    });

    function animate() {
      
      ctx.shadowBlur = 0;
      ctx.shadowColor = "transparent";
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = "source-over";

      
      

      if (currentTheme === "dark") {
        ctx.fillStyle = "rgba(0, 0, 0, 0.12)";
      } else {
        ctx.fillStyle = "rgba(255, 255, 255, 0.12)";
      }
      ctx.fillRect(0, 0, width, height);

     
      particles.forEach(function (p) {
        p.update(currentMode);

        if (currentTheme === "dark") {
         
          ctx.fillStyle = "#ffffff"; 
          ctx.shadowBlur = 15;
          ctx.shadowColor = "rgba(255, 255, 255, 1)";
        } else {
          
          ctx.fillStyle = `hsl(${p.hue}, 100%, 50%)`; 
          ctx.shadowBlur = 20; 
          ctx.shadowColor = `hsl(${p.hue}, 100%, 50%)`; 
        }

        p.draw();
      });

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
